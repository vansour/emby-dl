name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pkg_ext: .tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            pkg_ext: .tar.gz
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            pkg_ext: .tar.gz
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            pkg_ext: .tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            pkg_ext: .zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            pkg_ext: .zip
          - target: i686-pc-windows-msvc
            os: windows-latest
            pkg_ext: .zip
          - target: x86_64-apple-darwin
            os: macos-latest
            pkg_ext: .tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            pkg_ext: .tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              ;;
            i686-unknown-linux-gnu)
              sudo apt-get install -y gcc-i686-linux-gnu
              echo "CC_i686_unknown_linux_gnu=i686-linux-gnu-gcc" >> $GITHUB_ENV
              echo "AR_i686_unknown_linux_gnu=i686-linux-gnu-ar" >> $GITHUB_ENV
              echo "CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER=i686-linux-gnu-gcc" >> $GITHUB_ENV
              ;;
            armv7-unknown-linux-gnueabihf)
              sudo apt-get install -y gcc-arm-linux-gnueabihf
              echo "CC_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
              echo "AR_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-ar" >> $GITHUB_ENV
              echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
              ;;
          esac

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN_NAME="emby-dl"
          ARCHIVE_NAME="${BIN_NAME}-${{ matrix.target }}${{ matrix.pkg_ext }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${BIN_NAME}"
          tar czf "${ARCHIVE_NAME}" "${BIN_NAME}"
          echo "archive=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN_NAME = "emby-dl"
          $ARCHIVE_NAME = "${BIN_NAME}-${{ matrix.target }}${{ matrix.pkg_ext }}"
          Copy-Item "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "${BIN_NAME}.exe"
          Compress-Archive -Path "${BIN_NAME}.exe" -DestinationPath "${ARCHIVE_NAME}"
          echo "archive=${ARCHIVE_NAME}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Extract changelog for this version
        shell: bash
        run: |
          awk -v tag="${{ github.ref_name }}" \
            '/^## /{found=0} $0 ~ "^## " tag {found=1} found' \
            CHANGELOG.md > release_body.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: ${{ env.archive }}

  scoop-manifest:
    name: Generate Scoop manifest
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate Scoop manifest & Homebrew formula
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Hashes are now computed directly above

          cat > bucket/emby-dl.json <<EOF
          {
            "version": "$VERSION",
            "description": "从 Emby 媒体服务器下载视频的命令行工具",
            "homepage": "https://github.com/vansour/emby-dl",
            "license": "Unknown",
            "architecture": {
              "64bit": {
                "url": "https://github.com/vansour/emby-dl/releases/download/v\$version/emby-dl-x86_64-pc-windows-msvc.zip",
                "hash": "$HASH_X64"
              },
              "32bit": {
                "url": "https://github.com/vansour/emby-dl/releases/download/v\$version/emby-dl-i686-pc-windows-msvc.zip",
                "hash": "$HASH_32"
              },
              "arm64": {
                "url": "https://github.com/vansour/emby-dl/releases/download/v\$version/emby-dl-aarch64-pc-windows-msvc.zip",
                "hash": "$HASH_ARM64_WIN"
              }
            },
            "bin": "emby-dl.exe",
            "checkver": {
              "github": "https://github.com/vansour/emby-dl"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/vansour/emby-dl/releases/download/v\$version/emby-dl-x86_64-pc-windows-msvc.zip"
                },
                "32bit": {
                  "url": "https://github.com/vansour/emby-dl/releases/download/v\$version/emby-dl-i686-pc-windows-msvc.zip"
                },
                "arm64": {
                  "url": "https://github.com/vansour/emby-dl/releases/download/v\$version/emby-dl-aarch64-pc-windows-msvc.zip"
                }
              },
              "hash": {
                "mode": "download"
              }
            }
          }
          EOF

          cat > Formula/emby-dl.rb <<EOF
          class EmbyDl < Formula
            desc "从 Emby 媒体服务器下载视频的命令行工具"
            homepage "https://github.com/vansour/emby-dl"
            license "Unknown"
            version "$VERSION"

            on_macos do
              on_intel do
                url "https://github.com/vansour/emby-dl/releases/download/v\#{version}/emby-dl-x86_64-apple-darwin.tar.gz"
                sha256 "$HASH_X64"
              end
              on_arm do
                url "https://github.com/vansour/emby-dl/releases/download/v\#{version}/emby-dl-aarch64-apple-darwin.tar.gz"
                sha256 "$HASH_ARM"
              end
            end

            def install
              bin.install "emby-dl"
            end

            test do
              assert_match "emby-dl \#{version}", shell_output("\#{bin}/emby-dl --version")
            end
          end
          EOF

      - name: Upload Scoop manifest & Homebrew formula to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bucket/emby-dl.json
            Formula/emby-dl.rb
